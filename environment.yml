name: pdf2md
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.1.0
  - torchvision
  - cpuonly  # CPU-only PyTorch (lighter, no CUDA needed)
  - pip
  - pip:
      - fastapi==0.115.0
      - uvicorn[standard]==0.32.0
      - python-multipart==0.0.12
      - websockets==13.1
      - aiofiles==24.1.0
      - pydantic>=2.12.0
      - pydantic-settings==2.6.0
      - glmocr[selfhosted]>=0.1.0
